name: Fermentation refresh

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Security check
        run: python3 scripts/security_check.py

      - name: Generate base data if needed
        run: python3 scripts/run_daily.py
        env:
          X_SOURCE_PROVIDER: ${{ secrets.X_SOURCE_PROVIDER }}
          X_DAILY_LIMIT: "60"
          X_JOYBUY_DAILY_LIMIT: "45"
          X_TEMU_DAILY_LIMIT: "15"
          X_MAX_API_REQUESTS: "6"
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          AISA_API_KEY: ${{ secrets.AISA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Refresh fermentation radar
        run: python3 scripts/run_fermentation_refresh.py
        env:
          X_SOURCE_PROVIDER: ${{ secrets.X_SOURCE_PROVIDER }}
          X_DAILY_LIMIT: "60"
          X_JOYBUY_DAILY_LIMIT: "45"
          X_TEMU_DAILY_LIMIT: "15"
          X_MAX_API_REQUESTS: "6"
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - name: Check static dashboard
        run: |
          python3 scripts/check_dashboard_data.py
          python3 scripts/verify_data.py
          python3 scripts/report_run_summary.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
